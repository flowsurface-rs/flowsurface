# Infrastructure tasks for flowsurface
# SSH tunnel to bigblack ClickHouse for range bar data

["tunnel:start"]
description = "Start SSH tunnel to bigblack ClickHouse (localhost:18123 → bigblack:8123)"
run = """
if lsof -ti:18123 >/dev/null 2>&1; then
  echo "Tunnel already running on port 18123"
  exit 0
fi
echo "Starting SSH tunnel to bigblack..."
ssh -fNL 18123:localhost:8123 bigblack
echo "SSH tunnel started: localhost:18123 → bigblack:8123"
"""

["tunnel:stop"]
description = "Stop SSH tunnel to bigblack ClickHouse"
run = """
PID=$(lsof -ti:18123 2>/dev/null)
if [ -n "$PID" ]; then
  kill $PID
  echo "Tunnel stopped (pid $PID)"
else
  echo "No tunnel running on port 18123"
fi
"""

["tunnel:status"]
description = "Check SSH tunnel status and verify ClickHouse connectivity"
run = """
PID=$(lsof -ti:18123 2>/dev/null)
if [ -n "$PID" ]; then
  echo "Tunnel UP (pid $PID, port 18123)"
  RESULT=$(curl -sf --connect-timeout 2 "http://localhost:18123" --data "SELECT 'ok' FORMAT TabSeparated" 2>&1)
  if [ "$RESULT" = "ok" ]; then
    echo "ClickHouse reachable via tunnel"
    curl -s "http://localhost:18123" --data "SELECT threshold_decimal_bps, count(*) as bars FROM opendeviationbar_cache.open_deviation_bars WHERE symbol = 'BTCUSDT' GROUP BY threshold_decimal_bps ORDER BY threshold_decimal_bps FORMAT TabSeparated"
  else
    echo "WARNING: Tunnel exists but ClickHouse not responding"
  fi
else
  echo "Tunnel DOWN (port 18123 not open)"
fi
"""

[preflight]
description = "Establish tunnel + validate ClickHouse connectivity and data before app launch"
depends = ["tunnel:start"]
run = """
set -e

CH="http://localhost:18123"
MAX_RETRIES=3
RETRY_DELAY=2

echo "=== Flowsurface Preflight ==="

# 0a. Auto-update opendeviationbar-core to latest compatible version
echo ""
echo "[0/5] Updating opendeviationbar-core..."
BEFORE=$(awk -F'"' '/name = "opendeviationbar-core"/{getline; print $2}' Cargo.lock)
cargo update -p opendeviationbar-core --quiet 2>/dev/null || true
AFTER=$(awk -F'"' '/name = "opendeviationbar-core"/{getline; print $2}' Cargo.lock)
if [ "$BEFORE" != "$AFTER" ]; then
  echo "  Updated: $BEFORE -> $AFTER"
else
  echo "  Already at latest: $AFTER"
fi

# 0b. Sync upstream fork (fast-forward only — never conflicts)
echo ""
echo "[1/5] Syncing upstream (flowsurface-rs/flowsurface)..."
git fetch upstream --quiet 2>/dev/null || true
BEHIND=$(git rev-list --count HEAD..upstream/main 2>/dev/null || echo 0)
if [ "$BEHIND" -gt 0 ]; then
  if git merge-base --is-ancestor HEAD upstream/main 2>/dev/null; then
    echo "  Fast-forwarding $BEHIND commits from upstream..."
    git merge upstream/main --ff-only --quiet
    echo "  Upstream synced (fast-forward)"
  else
    echo "  WARNING: $BEHIND upstream commits available but merge requires conflict resolution"
    echo "  Run: mise run upstream:merge"
  fi
else
  echo "  Already up to date with upstream"
fi

# 2. Verify ClickHouse responds
echo ""
echo "[2/5] Checking ClickHouse connectivity..."
for i in $(seq 1 $MAX_RETRIES); do
  RESULT=$(curl -sf --connect-timeout 3 "$CH" --data "SELECT 'ok' FORMAT TabSeparated" 2>&1) && break
  echo "  Attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..."
  sleep $RETRY_DELAY
done
if [ "$RESULT" != "ok" ]; then
  echo "FATAL: ClickHouse not responding on port 18123 after $MAX_RETRIES attempts"
  echo "  Is bigblack online? Check: ssh bigblack 'clickhouse client -q \"SELECT 1\"'"
  exit 1
fi
echo "  ClickHouse responding"

# 2. Verify opendeviationbar_cache database and table exist
echo ""
echo "[3/5] Checking opendeviationbar_cache schema..."
TABLE_EXISTS=$(curl -sf "$CH" --data "SELECT count() FROM system.tables WHERE database='opendeviationbar_cache' AND name='open_deviation_bars' FORMAT TabSeparated" 2>&1)
if [ "$TABLE_EXISTS" != "1" ]; then
  echo "FATAL: opendeviationbar_cache.open_deviation_bars table not found"
  echo "  Run populate_cache_resumable() from opendeviationbar-py first"
  exit 1
fi
echo "  opendeviationbar_cache.open_deviation_bars exists"

# 3. Verify data is present for at least one symbol/threshold
echo ""
echo "[4/5] Checking range bar data..."
DATA=$(curl -sf "$CH" --data "
  SELECT threshold_decimal_bps, count(*) as bars
  FROM opendeviationbar_cache.open_deviation_bars
  WHERE symbol = 'BTCUSDT'
  GROUP BY threshold_decimal_bps
  ORDER BY threshold_decimal_bps
  FORMAT TabSeparated
" 2>&1)

if [ -z "$DATA" ]; then
  echo "FATAL: No range bar data found for BTCUSDT"
  echo "  Populate cache on bigblack first"
  exit 1
fi

echo "  BTCUSDT thresholds available:"
echo "$DATA" | while IFS=$'\t' read -r threshold bars; do
  printf "    BPR%-4s  %s bars\n" "$((threshold / 10))" "$bars"
done

echo ""
echo "=== Preflight PASSED ==="
"""

["symbols:list"]
description = "List range bar symbols available in ClickHouse (SSoT for ticker filtering)"
depends = ["tunnel:start"]
run = """
CH="http://localhost:18123"

echo "Querying ClickHouse for available range bar symbols..."
SYMBOLS=$(curl -sf "$CH" --data "
  SELECT DISTINCT symbol
  FROM opendeviationbar_cache.open_deviation_bars
  ORDER BY symbol
  FORMAT TabSeparated
" 2>&1)

if [ -z "$SYMBOLS" ]; then
  echo "ERROR: No symbols found in opendeviationbar_cache.open_deviation_bars"
  exit 1
fi

COUNT=$(echo "$SYMBOLS" | wc -l | tr -d ' ')
echo "Found $COUNT symbols in ClickHouse (app queries this at startup):"
echo "$SYMBOLS" | while read -r sym; do printf "  %s\\n" "$sym"; done
"""
